name: autoab 订单监控 - 云端定时

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-check]

jobs:
  check-orders:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 恢复已通知状态
        id: cache-state
        uses: actions/cache@v4
        with:
          path: state.json
          key: autoab-state-${{ github.run_id }}
          restore-keys: |
            autoab-state-

      - name: 检测新订单并推送
        env:
          AUTOAB_USERNAME: ${{ secrets.AUTOAB_USERNAME }}
          AUTOAB_PASSWORD: ${{ secrets.AUTOAB_PASSWORD }}
          AUTOAB_GRABID: ${{ secrets.AUTOAB_GRABID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python autoab_notify.py
